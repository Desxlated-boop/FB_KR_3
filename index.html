<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="apple-touch-icon" href="/icons/FutureIcon152x152.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="icon" href="icons/FutureIcon.ico" sizes="16x16" type="image/ico">
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
        }
    
        .card {
            background-color: #2d2d2d;
            border-left-color: #6c6c6c;
        }
    
        input,
        textarea,
        select {
            background-color: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #555;
        }
    
        input:focus {
            border-color: #888;
        }
    
        button,
        .button {
            background-color: #30b284 !important;
            color: #ffffff;
        }
    
        button:hover,
        .button:hover {
            background-color: #0f0066 !important;
        }
    
        .tab.active {
            background-color: #30b284 !important;
        }
    
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Заметки</h1>
        <nav class="tabs is-center">
            <button id="home-btn" class="tab active col-6">Главная</button>
            <button id="about-btn" class="tab col-6">О приложении</button>
        </nav>
    </header>
    
    <main id="app-content" class="container" style="margin-top: 2rem;"></main>

    <footer class="is-center">
        <button id="enable-push" class="button success">Включить уведомления</button>
        <button id="disable-push" class="button error" style="display:none;">Отключить уведомления</button>
    </footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
